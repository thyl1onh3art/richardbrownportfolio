<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Richard Brown</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="header_con">
    <div class="header_name">Richard Brown</div>
    <div class="editor">Computer Science Student</div>
  </div>
</header>

<div class="contact_container">

  <div class="contact_container_details">

    <h2>Get In Touch</h2>

    <p>
      Please contact me regarding IT opportunities,
      projects, or professional enquiries.
    </p>

    <form action="https://formspree.io/f/YOUR-FORM-ID" method="POST">

      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email Address</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit" class="submit_button">
        Send Message
      </button>

    </form>

    <a href="index.html" class="home_button">
      Return to Home
    </a>

  </div>

</div>

<script src="contactjs.js"></script>

</body>
</html>
